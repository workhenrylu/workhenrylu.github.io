  <!-- Header -->

        上传新数据

    </div>

  <!-- Main Dashboard -->

    <!-- KPI Row -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Row 1: Trend + Pie + Gauge -->
    <div class="chart-grid row-1">
      <div class="chart-panel">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div class="panel-title"><span class="dot"></span>月度工资趋势总览</div>

      <div class="chart-panel">

      <div class="chart-panel">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

        <div class="chart-container" id="chart-monthly-pie"></div>
      </div>
    </div>

    <!-- Row 2: Yearly Bar + Radar + Deduction -->

      <div class="chart-panel">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

      </div>
      <div class="chart-panel">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div class="panel-title"><span class="dot"></span>社保公积金明细</div>
        <div class="chart-container" id="chart-deduction"></div>
      </div>
    </div>

    <!-- Row 3: Heatmap + Table -->
    <div class="chart-grid row-3">
      <div class="chart-panel">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div class="panel-title"><span class="dot"></span>月度收入热力图</div>
        <div class="chart-container tall" id="chart-heatmap"></div>
      </div>
      <div class="chart-panel">
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <div class="panel-title"><span class="dot"></span>详细数据明细</div>
        <div class="data-table-wrap" id="data-table-wrap"></div>
      </div>
    </div>
  </main>

  <!-- Upload Overlay -->
  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-modal">
      <h2>上传工资数据文件</h2>
      <p>支持 .xlsx / .xls 格式，数据结构需与当前模板一致</p>
      <div class="upload-success" id="upload-success">数据更新成功！图表已刷新。</div>
